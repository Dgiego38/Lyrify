<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lyrify - Connexion</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .login-container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .btn-spotify {
            background-color: #1DB954;
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-spotify:active {
            transform: scale(0.95);
            background-color: #1ed760;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Lyrify</h1>
        <p>Vos paroles synchronisées style Apple Music.</p>
        <button id="welcome-login-btn" class="btn-spotify">Se connecter avec Spotify</button>
    </div>

    <script>
        const CLIENT_ID = 'bca08c406d4847d6ae1e56c04894fbcb';
        const SCOPES = 'user-read-currently-playing user-read-playback-state';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // Outils Crypto pour le flux PKCE
        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return Array.from(values, x => possible[x % possible.length]).join('');
        }

        async function sha256(plain) {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return crypto.subtle.digest('SHA-256', data);
        }

        function base64urlencode(a) {
            return btoa(String.fromCharCode.apply(null, new Uint8Array(a)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            // Si le code d'autorisation est dans l'URL, on bascule sur index.html pour faire l'échange
            if (code) {
                window.location.href = `index.html?code=${code}`;
                return;
            }

            // Si l'utilisateur est déjà connecté avec un token, direction l'app
            if (localStorage.getItem('spotify_token')) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('welcome-login-btn').addEventListener('click', async () => {
            const codeVerifier = generateRandomString(64);
            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64urlencode(hashed);

            // On stocke le code_verifier pour que index.html puisse le récupérer lors de l'échange
            localStorage.setItem('spotify_code_verifier', codeVerifier);

            const authUrl = `https://accounts.spotify.com/authorize?` + new URLSearchParams({
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: SCOPES,
                redirect_uri: REDIRECT_URI,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                show_dialog: 'true'
            }).toString();

            window.location.href = authUrl;
        });
    </script>
</body>
</html>
