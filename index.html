<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lyrify</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lyrify">
    <link rel="apple-touch-icon" href="https://placehold.co/512x512/000000/ffffff?text=Lyrify">
</head>
<body>

    <section id="welcome-screen" class="hidden">
        <div class="welcome-content">
            <div class="app-logo">🎶</div>
            <h1>Lyrify</h1>
            <p>Affichez vos paroles de chansons en temps réel avec un style fluide inspiré d'Apple Music.</p>
            <button id="welcome-login-btn">Se connecter avec Spotify</button>
        </div>
    </section>

    <div id="main-app" class="hidden">
        <header>
            <h1>Lyrify</h1>
        </header>

        <main>
            <section id="player-section">
                <div id="track-card">
                    <img id="album-art" src="https://placehold.co/60x60/121212/ffffff?text=Lyrify" alt="Album Art">
                    <div class="track-info">
                        <h2 id="track-title">Aucune musique</h2>
                        <p id="track-artist">Lancez un morceau sur Spotify</p>
                    </div>
                </div>
            </section>

            <section id="lyrics-section">
                <div id="lyrics-container">
                    <p class="placeholder-text">En attente de Spotify...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
