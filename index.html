<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Lyrify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-app" class="hidden">
        
        <div id="player-bar">
            <img id="album-art" src="https://via.placeholder.com/60" alt="Pochette d'album">
            <div id="track-info">
                <div id="track-title">Aucune musique</div>
                <div id="track-artist">Lancez un morceau sur Spotify</div>
            </div>
        </div>

        <div id="lyrics-section">
            <div id="lyrics-container">
                <p class="placeholder-text">Connexion à votre flux Spotify...</p>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
