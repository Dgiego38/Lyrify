<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Lyrify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-app" class="hidden">
        
        <div id="player-bar" style="opacity: 0;">
            <img id="album-art" src="" alt="Pochette">
            <div id="track-info">
                <div id="track-title">Aucune musique</div>
                <div id="track-artist">Lancez un morceau</div>
            </div>
        </div>

        <div id="loading-screen">
            <img id="loading-art" src="https://via.placeholder.com/300" alt="Pochette Album">
            <div id="loading-title">Aucune musique</div>
            <div id="loading-artist">Lancez un morceau sur Spotify</div>
            <div class="wave-loader" id="wave-container">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div id="lyrics-section" style="display: none;">
            <div id="lyrics-container"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
