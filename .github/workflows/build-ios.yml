name: Build iOS IPA Direct

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile iOS Application
    runs-on: macos-latest

    steps:
      - name: Récupérer le code de ton dépôt
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # LE SCRIPT CRÉE TOUT TOUT SEUL ICI
      - name: Préparer la structure Capacitor pour iOS
        run: |
          # 1. Crée les fichiers de configuration manquants
          echo '{"name": "lyrify", "version": "1.0.0", "dependencies": {"@capacitor/cli": "^6.0.0", "@capacitor/core": "^6.0.0", "@capacitor/ios": "^6.0.0"}}' > package.json
          echo '{"appId": "com.diego.lyrify", "appName": "Lyrify", "webDir": "www"}' > capacitor.config.json
          
          # 2. Crée le dossier www et copie tes fichiers web dedans pour le compilateur Apple
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp login.html www/ 2>/dev/null || true
          cp app.js www/ 2>/dev/null || true
          cp style.css www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true

      - name: Installer les outils de build Apple
        run: |
          npm install
          npx cap ios add || true
          npx cap sync ios

      - name: Compiler en application iOS native avec Xcode
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     clean build \
                     CODE_SIGNING_ALLOWED=NO

      - name: Empaqueter l'application en fichier .IPA pour iPhone
        run: |
          mkdir -p Payload
          mv ios/App/build/Release-iphoneos/App.app Payload/
          zip -r Lyrify-Apple.ipa Payload

      - name: Livrer le fichier IPA final
        uses: actions/upload-artifact@v4
        with:
          name: Lyrify-iOS-File
          path: Lyrify-Apple.ipa
